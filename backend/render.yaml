services:
  - type: web
    name: breach-simu-api
    env: docker
    dockerfilePath: ./backend/Dockerfile
    context: .
    plan: free
    region: singapore
    envVars:
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        fromDatabase:
          name: breach-simu-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://breach-simu.vercel.app,http://localhost:5173
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: breach-simu-db
    plan: free
    databaseName: breach_simu
    user: postgres
